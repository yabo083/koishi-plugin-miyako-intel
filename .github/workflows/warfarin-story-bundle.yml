name: Warfarin Story Bundle

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
    inputs:
      force_deep_check:
        description: "Force full Warfarin API detail crawl instead of seed/unchanged fast path"
        required: false
        type: boolean
        default: false
      categories:
        description: "Optional comma-separated categories for test runs"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-story-bundle:
    runs-on: [self-hosted, linux, warfarin-story]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Build server
        run: npm run build:server

      - name: Build Warfarin story bundle
        env:
          STORY_UPDATE_RATE_LIMIT_MS: "300"
          STORY_UPDATE_CONCURRENCY: "3"
          STORY_SOURCE_UPDATE_DELAY_HOURS: "24"
          STORY_FORCE_DEEP_CHECK: ${{ github.event.inputs.force_deep_check == 'true' && '1' || '0' }}
          STORY_CATEGORIES: ${{ github.event.inputs.categories }}
        run: node scripts/build-warfarin-story-bundle.mjs

      - name: Publish bundle release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f artifacts/warfarin-story/warfarin-story-cn.json.gz ]; then
            echo "Warfarin source update date is unchanged; skipping release upload."
            cat artifacts/warfarin-story/skipped.json
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f warfarin-story-latest
          git push origin refs/tags/warfarin-story-latest --force
          gh release view warfarin-story-latest >/dev/null 2>&1 || gh release create warfarin-story-latest --title "Warfarin Story Bundle" --notes "Compressed Warfarin Wiki story text bundle for miyako-intel."
          gh release upload warfarin-story-latest artifacts/warfarin-story/warfarin-story-cn.json.gz artifacts/warfarin-story/warfarin-story-cn.manifest.json --clobber
